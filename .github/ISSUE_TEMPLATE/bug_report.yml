name: Bug report
description: Report a reproducible GameCrashAgent problem without private diagnostic data.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not attach raw minidumps, credentials, or unredacted reports.
  - type: input
    id: version
    attributes:
      label: GameCrashAgent version
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows version
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Minimal reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I reviewed all text and attachments and removed private information.
          required: true
