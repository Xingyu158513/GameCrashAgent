name: Feature request
description: Propose a focused, read-only diagnostic improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed read-only solution
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: New data and privacy impact
      description: List every new field that would be collected.
    validations:
      required: true
